name: Publish Python Package

on:
  workflow_dispatch:
    inputs:
      version:
        description: Exact package version to publish
        required: true
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate release version, tag, and changelog
        id: release
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_VERSION: ${{ inputs.version }}
        run: >-
          python tools/release.py
          --event-name "$EVENT_NAME"
          --ref-name "$REF_NAME"
          --input-version "$INPUT_VERSION"
          --check-pypi
          --release-notes-output release-notes.md
          --github-output "$GITHUB_OUTPUT"
      - name: Install build tooling
        run: python -m pip install build hatchling nox
      - name: Build package
        run: nox -s package
      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
      - name: Upload release notes
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release-notes.md

  publish:
    name: Publish distribution to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/omegaflow
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
      - name: Publish distribution to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  release:
    name: Publish GitHub Release
    needs:
      - build
      - publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download distributions and release notes
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: release/
      - name: Download release notes
        uses: actions/download-artifact@v4
        with:
          name: release-notes
          path: release/
      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.tag }}
          name: OmegaFlow ${{ needs.build.outputs.version }}
          body_path: release/release-notes.md
          files: |
            release/*.tar.gz
            release/*.whl
          fail_on_unmatched_files: true
          overwrite_files: true
