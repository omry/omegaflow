name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  python:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package and test dependencies
        run: python -m pip install -e ".[dev,browser]"

      - name: Install Chromium and browser system dependencies
        run: python -m playwright install --with-deps chromium

      - name: Install browser media tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes ffmpeg

      - name: Run canonical CI checks
        run: nox -s ci

      - name: Summary
        if: always()
        run: |
          {
            echo "## Python tests"
            echo ""
            echo "- Installed the package with dev and browser dependencies."
            echo "- Installed pinned Chromium, FFmpeg, and FFprobe."
            echo "- Ran \`nox -s ci\` (tests and generated schema docs)."
            echo "- Job status: ${{ job.status }}"
          } >> "$GITHUB_STEP_SUMMARY"

  package:
    name: Package build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install build tooling
        run: python -m pip install build hatchling nox

      - name: Build distributions
        run: nox -s package

      - name: Smoke install Linux wheel
        run: |
          python -m pip install dist/*manylinux_2_35_x86_64.whl
          python -m pip check
          omegaflow --help

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: ci-python-package-distributions
          path: dist/

      - name: Summary
        if: always()
        run: |
          {
            echo "## Package build"
            echo ""
            echo "- Built source and wheel distributions."
            echo "- Smoke-installed the generated wheel."
            echo "- Uploaded distributions as CI artifacts."
            echo "- Job status: ${{ job.status }}"
          } >> "$GITHUB_STEP_SUMMARY"

  integration:
    name: Recording integration
    runs-on: ubuntu-latest
    env:
      ASCIINEMA_VERSION: v3.2.1
      ASCIINEMA_SHA256: 1b405bbda565b33c3c4718de67fedc3535580603c0694b1ff3fb04f363430a20
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package
        run: python -m pip install -e .

      - name: Install asciinema 3.x
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -fsSL \
            "https://github.com/asciinema/asciinema/releases/download/${ASCIINEMA_VERSION}/asciinema-x86_64-unknown-linux-gnu" \
            -o "$HOME/.local/bin/asciinema"
          echo "${ASCIINEMA_SHA256}  $HOME/.local/bin/asciinema" | sha256sum -c -
          chmod +x "$HOME/.local/bin/asciinema"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/asciinema" --version

      - name: Build generated quickstart recording
        run: |
          project="$RUNNER_TEMP/omegaflow-integration"
          mkdir -p "$project"
          cd "$project"
          omegaflow action=bootstrap
          omegaflow recording=quickstart action=build force=true
          test -s recordings/.omegaflow/videos/quickstart/presentation/recording.presentation.json
          test -s recordings/.omegaflow/videos/quickstart/presentation/recording.recording.json
          test -s recordings/.omegaflow/videos/quickstart/presentation/beats/first-video-beat.cast
          test -s recordings/.omegaflow/videos/quickstart/presentation/beats/second-video-beat.cast
          test -s recordings/.omegaflow/videos/quickstart/index.html

      - name: Upload recording artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-recording-integration-artifacts
          path: ${{ runner.temp }}/omegaflow-integration/recordings/.omegaflow/
          if-no-files-found: ignore
          include-hidden-files: true

      - name: Summary
        if: always()
        run: |
          {
            echo "## Recording integration"
            echo ""
            echo "- Installed asciinema ${ASCIINEMA_VERSION} from the upstream release binary."
            echo "- Bootstrapped a clean OmegaFlow project."
            echo "- Built the generated quickstart recording."
            echo "- Job status: ${{ job.status }}"
          } >> "$GITHUB_STEP_SUMMARY"

  docs:
    name: Website docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: website/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: website/pnpm-lock.yaml

      - name: Install website dependencies
        run: pnpm --dir website install --frozen-lockfile

      - name: Check generated schema docs
        run: python website/scripts/update_recording_schema_docs.py --check

      - name: Build website
        run: pnpm --dir website build

      - name: Summary
        if: always()
        run: |
          {
            echo "## Website docs"
            echo ""
            echo "- Installed website dependencies with pnpm."
            echo "- Checked generated schema docs."
            echo "- Built the Docusaurus site."
            echo "- Job status: ${{ job.status }}"
          } >> "$GITHUB_STEP_SUMMARY"
