name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  python:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package and test dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        run: pytest

      - name: Check generated schema docs
        run: python website/scripts/update_recording_schema_docs.py --check

      - name: Summary
        if: always()
        run: |
          {
            echo "## Python tests"
            echo ""
            echo "- Installed package with dev dependencies."
            echo "- Ran \`pytest\`."
            echo "- Checked generated recording schema docs."
            echo "- Job status: ${{ job.status }}"
          } >> "$GITHUB_STEP_SUMMARY"

  package:
    name: Package build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install build tooling
        run: python -m pip install build

      - name: Build distributions
        run: python -m build

      - name: Smoke install wheel
        run: |
          python -m pip install dist/*.whl
          python -m pip check
          omegaflow --help

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: ci-python-package-distributions
          path: dist/

      - name: Summary
        if: always()
        run: |
          {
            echo "## Package build"
            echo ""
            echo "- Built source and wheel distributions."
            echo "- Smoke-installed the generated wheel."
            echo "- Uploaded distributions as CI artifacts."
            echo "- Job status: ${{ job.status }}"
          } >> "$GITHUB_STEP_SUMMARY"

  docs:
    name: Website docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: website/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: website/pnpm-lock.yaml

      - name: Install website dependencies
        run: pnpm --dir website install --frozen-lockfile

      - name: Check generated schema docs
        run: python website/scripts/update_recording_schema_docs.py --check

      - name: Build website
        run: pnpm --dir website build

      - name: Summary
        if: always()
        run: |
          {
            echo "## Website docs"
            echo ""
            echo "- Installed website dependencies with pnpm."
            echo "- Checked generated schema docs."
            echo "- Built the Docusaurus site."
            echo "- Job status: ${{ job.status }}"
          } >> "$GITHUB_STEP_SUMMARY"
