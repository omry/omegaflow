defaults:
  - studio_schema
  - _self_
  - optional /.omegaflow@_here_: config
  - override hydra/job_logging: disabled
  - override hydra/hydra_logging: disabled

hydra:
  searchpath:
    - file://.
  output_subdir: null
  run:
    dir: ${studio_run_dir:${project_root},${studio.data_dir},${action},${step},${dry_run},${recording},${now:%Y%m%d-%H%M%S}}
  job:
    name: omegaflow
    chdir: false
